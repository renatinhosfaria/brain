services:
  postgres:
    build: ./docker/postgres
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: brain
    command: ["postgres", "-c", "shared_preload_libraries=age"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - repo_cache:/app/repo_cache
    command: ["sh", "-c", "uv run --no-dev alembic upgrade head && uv run --no-dev uvicorn brain.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - repo_cache:/app/repo_cache
    command: ["uv", "run", "--no-dev", "python", "-m", "brain.worker"]

  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${BRAIN_HTTP_PORT:-80}:80"
      - "${BRAIN_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./docker/backup/backup.sh:/usr/local/bin/brain-backup:ro
      - backups:/backups
    command: ["sh", "/usr/local/bin/brain-backup"]

volumes:
  pgdata:
  repo_cache:
  caddy_data:
  caddy_config:
  backups:
