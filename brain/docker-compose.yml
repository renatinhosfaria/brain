services:
  postgres:
    build: ./docker/postgres
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: brain
    command: ["postgres", "-c", "shared_preload_libraries=age"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "uv run alembic upgrade head && uv run uvicorn brain.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "python", "-m", "brain.worker"]

volumes:
  pgdata:
